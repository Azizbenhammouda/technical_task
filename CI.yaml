name: CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # get the code from repo
      - name: checkout code
        uses: actions/checkout@v4

      # build Docker image for python app
      - name: build docker image
        run: |
          cd python-app
          docker build -t python-app .

      # run tests inside the container
      - name: run tests
        run: |
          cd python-app
          docker run python-app pytest
